{% extends 'weather/base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 shadow">
                <h2 class="text-center mb-4">🌤 WeatherCast - Login</h2>
                <div id="message" class="alert d-none"></div>
                <form id="loginForm">
                    <input type="text" id="username" class="form-control mb-3" placeholder="Username" required>
                    <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <p class="text-center mt-3">Don't have account? <a href="/register/" class="text-primary">Register</a></p>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };
        const res = await fetch('/api/login/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (res.ok) {
            localStorage.setItem('token', result.token);
            window.location.href = '/dashboard/';
        } else {
            alert('Invalid credentials');
        }
    });
</script>
{% endblock %}
