{% extends 'weather/base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 shadow">
                <h2 class="text-center mb-4">🌤 WeatherCast - Register</h2>
                <div id="message" class="alert d-none"></div>
                
                <form id="registerForm">
                    <div class="mb-3">
                        <input type="text" id="username" class="form-control" placeholder="Username" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" id="email" class="form-control" placeholder="Email (optional)">
                    </div>
                    <div class="mb-3">
                        <input type="password" id="password" class="form-control" placeholder="Password" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" id="confirm_password" class="form-control" placeholder="Confirm Password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100 mb-3">Register</button>
                </form>
                
                <p class="text-center mb-0">
                    Already have an account? 
                    <a href="/" class="text-primary fw-bold">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;

        // Basic validation
        if (password !== confirmPassword) {
            alert("Passwords do not match!");
            return;
        }
        if (password.length < 6) {
            alert("Password must be at least 6 characters long.");
            return;
        }

        const data = {
            username: username,
            email: email,
            password: password
        };

        try {
            const res = await fetch('/api/register/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await res.json();

            if (res.ok) {
                // Auto login after successful registration
                localStorage.setItem('token', result.token);
                alert('Registration successful! Welcome to WeatherCast.');
                window.location.href = '/dashboard/';
            } else {
                alert(result.username ? result.username[0] : 
                      result.email ? result.email[0] : 
                      'Registration failed. Please try again.');
            }
        } catch (error) {
            alert('Something went wrong. Please check your internet connection.');
            console.error(error);
        }
    });
</script>
{% endblock %}
